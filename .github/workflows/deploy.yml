name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas pro GITHUB_TOKEN deployar.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancela um deploy anterior se um novo push chegar.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build (Vite com base /PROJETO_RFID/ + 404.html fallback)
        run: npm run build

      # `enablement: true` faz a action habilitar o Pages automaticamente
      # caso ainda não esteja ligado. Usa o GITHUB_TOKEN (já tem pages:write).
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
